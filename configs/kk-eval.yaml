model:
  family: "wav2vec2_asr"
  arch: "300m_v2"
  path: "/data/home/asan_tasmulaev/fine-tune/omniASR_CTC_300M_kk.pt"
tokenizer:
  name: "omniASR_tokenizer_written_v2"
dataset:
  name: "kazakh_asr"
  valid_split: "test"
  storage_mode: "MIXTURE_PARQUET"
  task_mode: "ASR"
  mixture_parquet_storage_config:
    beta_corpus: null
    beta_language: null
    fragment_streaming:
      partition_filters: 'pc.is_in(pc.field("corpus"), pa.array(["ksc2"]))'
    fragment_loading:
      cache: True
      num_parallel_fragments: 2
      nb_prefetch: 2
  asr_task_config:
    min_audio_len: 1
    max_audio_len: 960_000
    max_num_elements: 7_680_000
    batch_shuffle_window: 1
    normalize_audio: true
    example_shuffle_window: 1